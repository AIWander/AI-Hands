name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust tests and build check through the repository batch wrapper
        run: scripts\build-template.bat
        timeout-minutes: 15
      - name: Validate plugin profiles and hook policy
        run: |
          python plugins/test_plugin_profiles.py
          python plugins/ai-hands/tests/test_hands_policy.py

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: x64
            binary_suffix: x64
            installer_arch: x64compatible
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            suffix: arm64
            binary_suffix: aarch64
            installer_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Read pinned Voice-Command source
        id: voice-lock
        shell: pwsh
        run: |
          $lock = Get-Content integrations/voice-command.lock.json -Raw | ConvertFrom-Json
          "repository=$($lock.repository)" >> $env:GITHUB_OUTPUT
          "commit=$($lock.commit)" >> $env:GITHUB_OUTPUT
      - uses: actions/checkout@v7
        with:
          repository: ${{ steps.voice-lock.outputs.repository }}
          ref: ${{ steps.voice-lock.outputs.commit }}
          path: _voice-command
      - name: Verify pinned Voice-Command checkout
        shell: pwsh
        run: |
          $actual = git -C _voice-command rev-parse HEAD
          if ($actual -ne '${{ steps.voice-lock.outputs.commit }}') {
            throw "Voice-Command checkout drifted: $actual"
          }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build signed payload candidates through the repository batch wrapper
        shell: pwsh
        run: |
          $outputRoot = Join-Path $env:GITHUB_WORKSPACE '_release-payloads/${{ matrix.suffix }}'
          & scripts/build-release-payloads.bat '${{ matrix.target }}' (Resolve-Path _voice-command).Path $outputRoot
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $signedRoot = Join-Path $env:GITHUB_WORKSPACE '_signed-payloads/${{ matrix.suffix }}'
          New-Item -ItemType Directory -Path $signedRoot -Force | Out-Null
          $hands = Join-Path $signedRoot 'hands.exe'
          $voice = Join-Path $signedRoot 'voice-mcp.exe'
          Copy-Item (Join-Path $outputRoot 'hands/${{ matrix.target }}/release/hands.exe') $hands
          Copy-Item (Join-Path $outputRoot 'voice/${{ matrix.target }}/release/voice-mcp.exe') $voice
          "HANDS_EXE=$hands" >> $env:GITHUB_ENV
          "VOICE_EXE=$voice" >> $env:GITHUB_ENV
      - name: Require Authenticode signing credentials
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          foreach ($name in 'AZURE_TENANT_ID', 'AZURE_CLIENT_ID', 'AZURE_CLIENT_SECRET') {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Required Authenticode secret is missing: $name"
            }
          }
      - name: Authenticode sign Rust executables
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net
          trusted-signing-account-name: AIWander
          certificate-profile-name: cpc-signing
          files-folder: ${{ github.workspace }}/_signed-payloads/${{ matrix.suffix }}
          files-folder-filter: exe
      - name: Verify Rust Authenticode signatures
        shell: pwsh
        run: |
          $files = @(
            (Resolve-Path $env:HANDS_EXE).Path,
            (Resolve-Path $env:VOICE_EXE).Path
          )
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file
            if ($signature.Status -ne 'Valid') {
              throw "Authenticode verification failed for $file: $($signature.Status)"
            }
          }
          Copy-Item $env:HANDS_EXE "hands-${{ github.ref_name }}-${{ matrix.binary_suffix }}.exe"
      - name: Smoke-test signed MCP payloads
        shell: pwsh
        run: |
          & scripts/smoke-test.ps1 -ExePath $env:HANDS_EXE
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & scripts/smoke-test-voice.ps1 -ExePath $env:VOICE_EXE
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Install Inno Setup compiler
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Build four installer variants
        shell: pwsh
        run: |
          $hands = (Resolve-Path $env:HANDS_EXE).Path
          $voice = (Resolve-Path $env:VOICE_EXE).Path
          $voiceRoot = (Resolve-Path _voice-command).Path
          & installers/inno/build-package-matrix.bat $hands '${{ matrix.installer_arch }}' $voiceRoot $voice
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $installers = @(Get-ChildItem "dist/AIHands-Setup-*-*-${{ matrix.suffix }}.exe")
          if ($installers.Count -ne 4) {
            throw "Expected four installer variants, found $($installers.Count)."
          }
      - name: Authenticode sign installers
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net
          trusted-signing-account-name: AIWander
          certificate-profile-name: cpc-signing
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
      - name: Verify and cold-test every installer variant
        shell: pwsh
        run: |
          & scripts/cold-test-installers.ps1 `
            -InstallerDir dist `
            -Architecture '${{ matrix.suffix }}' `
            -HandsPayload $env:HANDS_EXE `
            -VoicePayload $env:VOICE_EXE `
            -TestRoot (Join-Path $env:RUNNER_TEMP 'aihands-cold-${{ matrix.suffix }}')
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.suffix }}
          path: |
            hands-*-${{ matrix.binary_suffix }}.exe
            dist/AIHands-Setup-*-${{ matrix.suffix }}.exe
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download all signed artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum *.exe > SHA256SUMS
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Add keyless Sigstore signatures
        working-directory: dist
        run: |
          for f in *.exe SHA256SUMS; do
            cosign sign-blob --yes "$f" \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem"
          done
      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.exe
            dist/SHA256SUMS
            dist/*.sig
            dist/*.pem
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
