name: Supply Chain

# Software-composition analysis:
#  - cargo audit: RustSec advisories (vulnerabilities / unmaintained / unsound / yanked)
#  - cargo deny:  license compliance, dependency bans, source allow-listing
# Both tools installed via taiki-e/install-action (prebuilt binaries — fast + reliable,
# avoids slow/network-flaky `cargo install` compiles). Advisories owned by the audit job.

on:
  push:
    branches: [main]
    paths: ["**/Cargo.toml", "**/Cargo.lock", "deny.toml", ".github/workflows/supply-chain.yml"]
  pull_request:
    paths: ["**/Cargo.toml", "**/Cargo.lock", "deny.toml", ".github/workflows/supply-chain.yml"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit (released Windows targets)
        # AI-Hands publishes only Windows x64/ARM64 executables. Cargo.lock also
        # contains Linux-only Wayland/XCB build metadata that is never compiled
        # into either released target; audit the actual shipping target set.
        run: cargo audit --target-os windows --target-arch x86_64 --target-arch aarch64

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny check licenses bans sources
